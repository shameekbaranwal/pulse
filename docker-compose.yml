services:
  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:4010/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
